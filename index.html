<!DOCTYPE html>
<html>
<head>
<title>TGC PAID SCRIMS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#0d0d0d;color:white;}
.page{display:none;padding:20px;}
.active{display:block;}
button{padding:12px;margin:5px;width:100%;background:red;color:white;border:none;border-radius:10px;font-size:15px;}
input,select{padding:10px;width:100%;margin:5px 0;border-radius:8px;border:none;}
h2{text-align:center;}
.card{background:#1a1a1a;padding:15px;margin:10px 0;border-radius:10px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="page active">
  <h2>TGC PAID SCRIMS</h2>
  <input id="email" placeholder="Email">
  <input id="pass" placeholder="Password">
  <button onclick="login()">LOGIN</button>
</div>

<!-- HOME -->
<div id="home" class="page">
  <h2>BIG UI PANEL</h2>
  <button onclick="show('mode')">SELECT MODE</button>
</div>

<!-- MODE -->
<div id="mode" class="page">
  <h2>SELECT MODE</h2>
  <button onclick="modeSelect('BR SCRIMS')">BR SCRIMS</button>
  <button onclick="modeSelect('CLASH SQUAD')">CLASH SQUAD</button>
  <button onclick="modeSelect('LONEWOLF')">LONEWOLF</button>
  <button onclick="modeSelect('BR PER KILL')">BR PER KILL</button>
</div>

<!-- ENTRY -->
<div id="entry" class="page">
  <h2>SELECT ENTRY</h2>
  <div id="entryList"></div>
</div>

<!-- TIME -->
<div id="time" class="page">
  <h2>SELECT TIME</h2>
  <button onclick="setTime('3:00 DAY')">3:00 DAY</button>
  <button onclick="setTime('1:00 DAY')">1:00 DAY</button>
  <button onclick="setTime('1:00 NIGHT')">1:00 NIGHT</button>
  <button onclick="setTime('9:00 NIGHT')">9:00 NIGHT</button>
</div>

<!-- DETAILS -->
<div id="details" class="page">
  <h2>ENTER DETAILS</h2>
  <input id="name" placeholder="Team / IGN">
  <button onclick="join()">JOIN</button>
</div>

<!-- ROOM -->
<div id="room" class="page">
  <h2>WAIT FOR ROOM ID PASSWORD</h2>
  <div id="roomData"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
  <h2>ADMIN PANEL</h2>

  <div class="card">
    <h3>Set Room</h3>
    <input id="roomId" placeholder="Room ID">
    <input id="roomPass" placeholder="Password">
    <button onclick="setRoom()">SET ROOM</button>
  </div>

  <div class="card">
    <h3>Joined Players</h3>
    <div id="players"></div>
  </div>

</div>

<script>
let user = {};
let isAdmin = false;

function show(p){
 document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
 document.getElementById(p).classList.add('active');
}

function login(){
 let email = document.getElementById('email').value;
 let pass = document.getElementById('pass').value;

 if(email==="admin@gmail.com" && pass==="admin"){
   isAdmin = true;
   show('admin');
   loadPlayers();
 } else {
   show('home');
 }
}

function modeSelect(m){
 user.mode = m;
 loadEntry(m);
 show('entry');
}

function loadEntry(mode){
 let box = document.getElementById('entryList');
 box.innerHTML="";

 if(mode==="BR SCRIMS"){
   let list=[20,25,35,40,45,50,55,75];
   list.forEach(e=>{
     box.innerHTML+=`<button onclick="setEntry(${e})">₹${e}</button>`;
   });
 } else {
   let list=[30,40,50,60,70];
   list.forEach(e=>{
     box.innerHTML+=`<button onclick="setEntry(${e})">₹${e}</button>`;
   });
 }
}

function setEntry(e){
 user.entry=e;
 show('time');
}

function setTime(t){
 user.time=t;
 show('details');
}

function join(){
 user.name=document.getElementById('name').value;

 let arr = JSON.parse(localStorage.getItem("players")||"[]");
 arr.push(user);
 localStorage.setItem("players",JSON.stringify(arr));

 show('room');
 loadRoom();
}

function setRoom(){
 localStorage.setItem("roomId",document.getElementById("roomId").value);
 localStorage.setItem("roomPass",document.getElementById("roomPass").value);
 alert("Room Updated");
}

function loadRoom(){
 let r=localStorage.getItem("roomId");
 let p=localStorage.getItem("roomPass");

 if(r){
   document.getElementById("roomData").innerHTML=
   "<h3>ROOM ID: "+r+"</h3><h3>PASS: "+p+"</h3>";
 } else {
   document.getElementById("roomData").innerHTML="WAITING...";
 }
}

function loadPlayers(){
 let arr = JSON.parse(localStorage.getItem("players")||"[]");
 let box=document.getElementById("players");
 box.innerHTML="";
 arr.forEach(p=>{
   box.innerHTML+=`
   <div class="card">
   ${p.name} | ${p.mode} | ₹${p.entry} | ${p.time}
   </div>`;
 });
}
</script>

</body>
</html>
