<!DOCTYPE html>
<html>
<head>
  <title>TGC PAID SCRIMS </title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)),
                  url('bg.jpg') no-repeat center center fixed;
      background-size: cover;
    }

    #app {
      max-width: 420px;
      margin: 40px auto;
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      box-shadow: 0 0 25px #00bfff;
    }

    input, button {
      width: 95%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #00bfff;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>
<div id="app"></div>

<script>
const app = document.getElementById("app");
const ADMIN_PASS = "9999";

/* ---------- STORAGE ---------- */

function getDB() {
  return JSON.parse(localStorage.getItem("users")) || {};
}
function saveDB(db) {
  localStorage.setItem("users", JSON.stringify(db));
}
function getProofs() {
  return JSON.parse(localStorage.getItem("proofs")) || [];
}
function saveProofs(p) {
  localStorage.setItem("proofs", JSON.stringify(p));
}
function setSession(u) {
  localStorage.setItem("session", u);
}
function getSession() {
  return localStorage.getItem("session");
}
function logout() {
  localStorage.removeItem("session");
  loginView();
}

/* ---------- LOGIN ---------- */

function loginView() {
  app.innerHTML = `
    <h2>Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="registerView()">Create Account</button>
    <button onclick="forgotView()">Forgot Password</button>
    <button onclick="adminLogin()">Admin</button>
  `;
}

function login() {
  let db = getDB();
  if (db[user.value] && db[user.value].pass === pass.value) {
    setSession(user.value);
    homeView();
  } else alert("Wrong login");
}

/* ---------- REGISTER ---------- */

function registerView() {
  app.innerHTML = `
    <h2>Create Account</h2>
    <input id="newUser" placeholder="Username">
    <input id="newPass" type="password" placeholder="Password">
    <button onclick="createAccount()">Create</button>
    <button onclick="loginView()">Back</button>
  `;
}

function createAccount() {
  let db = getDB();
  if (db[newUser.value]) return alert("User exists");

  db[newUser.value] = { pass: newPass.value, wallet: 0 };
  saveDB(db);
  alert("Account created");
  loginView();
}

/* ---------- RESET ---------- */

function forgotView() {
  app.innerHTML = `
    <h2>Reset Password</h2>
    <input id="user" placeholder="Username">
    <input id="newPass" placeholder="New Password">
    <button onclick="resetPassword()">Update</button>
    <button onclick="loginView()">Back</button>
  `;
}

function resetPassword() {
  let db = getDB();
  if (!db[user.value]) return alert("User not found");

  db[user.value].pass = newPass.value;
  saveDB(db);
  alert("Updated");
  loginView();
}

/* ---------- HOME ---------- */

function homeView() {
  let u = getSession();
  if (!u) return loginView();

  let db = getDB();

  app.innerHTML = `
    <h2>Dashboard</h2>
    <p>Wallet: ₹${db[u].wallet}</p>

    <button onclick="payNow()">💸 Add Money</button>
    <button onclick="modeSelect()">🎮 Play Modes</button>
    <button onclick="logout()">Logout</button>
  `;
}

/* ---------- PAYMENT PROOF ---------- */

function payNow() {
  app.innerHTML = `
    <h2>Add Money</h2>
    <img src="qr.jpg" style="width:220px">

    <p>Pay & Upload Screenshot</p>

    <input type="file" id="proof">
    <input id="amt" placeholder="Enter Amount">

    <button onclick="submitProof()">Submit</button>
    <button onclick="homeView()">Back</button>
  `;
}

function submitProof() {
  let u = getSession();
  let file = proof.files[0];
  let amount = parseInt(amt.value);

  if (!file || !amount) return alert("Fill all");

  let reader = new FileReader();
  reader.onload = function() {
    let proofs = getProofs();
    proofs.push({user:u, amount, img:reader.result, status:"pending"});
    saveProofs(proofs);

    alert("Submitted. Wait for admin.");
    homeView();
  };
  reader.readAsDataURL(file);
}

/* ---------- ADMIN ---------- */

function adminLogin() {
  let p = prompt("Enter Admin Password");
  if (p === ADMIN_PASS) adminPanel();
  else alert("Wrong");
}

function adminPanel() {
  let proofs = getProofs();
  let html = `<h2>Payment Requests</h2>`;

  proofs.forEach((p,i)=>{
    if(p.status==="pending"){
      html+=`
        <div style="border:1px solid #00bfff;margin:10px;padding:10px">
          <p>${p.user} - ₹${p.amount}</p>
          <img src="${p.img}" style="width:100%">
          <button onclick="approve(${i})">Approve</button>
          <button onclick="reject(${i})">Reject</button>
        </div>
      `;
    }
  });

  html+=`<button onclick="loginView()">Exit</button>`;
  app.innerHTML = html;
}

function approve(i){
  let proofs = getProofs();
  let db = getDB();

  let p = proofs[i];
  db[p.user].wallet += p.amount;

  proofs[i].status="approved";

  saveDB(db);
  saveProofs(proofs);

  alert("Approved");
  adminPanel();
}

function reject(i){
  let proofs = getProofs();
  proofs[i].status="rejected";
  saveProofs(proofs);
  adminPanel();
}

/* ---------- MODES ---------- */

function modeSelect(){
  app.innerHTML=`
    <h2>Select Mode</h2>

    <button onclick="scrims('CLASH SQUAD')">CLASH SQUAD</button>
    <button onclick="scrims('LONE WOLF')">LONE WOLF</button>
    <button onclick="scrims('BR PER KILL')">BR PER KILL</button>

    <button onclick="homeView()">Back</button>
  `;
}

/* ---------- SCRIMS ---------- */

function scrims(mode){
  app.innerHTML=`
    <h2>${mode}</h2>

    <button onclick="timeSelect(20)">₹20</button>
    <button onclick="timeSelect(25)">₹25</button>
    <button onclick="timeSelect(35)">₹35</button>
    <button onclick="timeSelect(40)">₹40</button>
    <button onclick="timeSelect(45)">₹45</button>
    <button onclick="timeSelect(50)">₹50</button>

    <button onclick="modeSelect()">Back</button>
  `;
}

/* ---------- TIME ---------- */

function timeSelect(price){
  app.innerHTML=`
    <h2>Select Time ₹${price}</h2>

    ${t(price,"1:00")}
    ${t(price,"1:30")}
    ${t(price,"2:00")}
    ${t(price,"2:30")}
    ${t(price,"3:00")}
    ${t(price,"3:30")}
    ${t(price,"4:00")}
    ${t(price,"4:30")}
    ${t(price,"5:00")}

    <button onclick="modeSelect()">Back</button>
  `;
}

function t(price,time){
  return `<button onclick="join(${price},'${time}')">${time}</button>`;
}

/* ---------- JOIN ---------- */

function join(price,time){
  let u=getSession();
  let db=getDB();

  if(db[u].wallet<price) return alert("Not enough money");

  db[u].wallet-=price;
  saveDB(db);

  alert("Joined ₹"+price+" at "+time);
  homeView();
}

/* ---------- START ---------- */

loginView();
</script>

</body>
</html>
