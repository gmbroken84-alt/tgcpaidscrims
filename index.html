<!DOCTYPE html>
<html>
<head>
  <title>TGC PAID SCRIMS</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;

      background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)),
                  url('bg.jpg') no-repeat center center fixed;
      background-size: cover;
    }

    #app {
      max-width: 420px;
      margin: 40px auto;
      padding: 25px;
      border-radius: 15px;
      text-align: center;

      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      box-shadow: 0 0 25px #00bfff;
    }

    h2 { font-size: 26px; }

    input {
      width: 95%;
      padding: 14px;
      margin: 12px 0;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 90%;
      padding: 14px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      background: #00bfff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="app"></div>

<script>
const app = document.getElementById("app");

/* ---------- STORAGE ---------- */

function getDB() {
  return JSON.parse(localStorage.getItem("users")) || {};
}

function saveDB(db) {
  localStorage.setItem("users", JSON.stringify(db));
}

function setSession(u) {
  localStorage.setItem("session", u);
}

function getSession() {
  return localStorage.getItem("session");
}

function logout() {
  localStorage.removeItem("session");
  loginView();
}

/* ---------- LOGIN ---------- */

function loginView() {
  app.innerHTML = `
    <h2>Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="registerView()">Create Account</button>
    <button onclick="forgotView()">Forgot Password</button>
  `;
}

function login() {
  let db = getDB();
  if (db[user.value] && db[user.value].pass === pass.value) {
    setSession(user.value);
    homeView();
  } else alert("Wrong login");
}

/* ---------- REGISTER ---------- */

function registerView() {
  app.innerHTML = `
    <h2>Create Account</h2>
    <input id="newUser" placeholder="Username">
    <input id="newPass" type="password" placeholder="Password">
    <button onclick="createAccount()">Create</button>
    <button onclick="loginView()">Back</button>
  `;
}

function createAccount() {
  let db = getDB();
  if (db[newUser.value]) return alert("User exists");

  db[newUser.value] = { pass: newPass.value, wallet: 0 };
  saveDB(db);
  alert("Account created");
  loginView();
}

/* ---------- RESET ---------- */

function forgotView() {
  app.innerHTML = `
    <h2>Reset Password</h2>
    <input id="user" placeholder="Username">
    <input id="newPass" placeholder="New Password">
    <button onclick="resetPassword()">Update</button>
    <button onclick="loginView()">Back</button>
  `;
}

function resetPassword() {
  let db = getDB();
  if (!db[user.value]) return alert("User not found");

  db[user.value].pass = newPass.value;
  saveDB(db);
  alert("Updated");
  loginView();
}

/* ---------- HOME ---------- */

function homeView() {
  let u = getSession();
  if (!u) return loginView();

  let db = getDB();

  app.innerHTML = `
    <h2>Dashboard</h2>
    <p>Wallet: ₹${db[u].wallet}</p>

    <button onclick="payNow()">💸 Add Money</button>
    <button onclick="scrimsView()">🎮 Join Scrims</button>
    <button onclick="logout()">Logout</button>
  `;
}

/* ---------- QR PAYMENT ---------- */

function payNow() {
  app.innerHTML = `
    <h2>💸 Add Money</h2>

    <img src="qr.jpg" style="width:250px;border-radius:10px">

    <p>Scan & Pay → Enter Amount</p>

    <input id="amt" placeholder="Enter Amount Paid">

    <button onclick="confirmPayment()">I Paid</button>
    <button onclick="homeView()">Back</button>
  `;
}

function confirmPayment() {
  let u = getSession();
  let db = getDB();

  let amount = parseInt(amt.value);

  if (!amount) return alert("Enter valid amount");

  db[u].wallet += amount;
  saveDB(db);

  alert("₹" + amount + " added");
  homeView();
}

/* ---------- SCRIMS ---------- */

function scrimsView() {
  app.innerHTML = `
    <h2>🔥 ADD LOBBY SCRIMS</h2>

    ${card(20,"Top1 ₹100 • Top2 ₹50 • Top3 ₹40")}
    ${card(25,"Top1 ₹100 • Top2 ₹50 • Top3 ₹50 • Top4 ₹40")}
    ${card(35,"Top1 ₹150 • Top2 ₹100 • Top3 ₹80 • Top4 ₹40")}
    ${card(40,"Top1 ₹180 • Top2 ₹100 • Top3 ₹60 • Top4 ₹40")}
    ${card(45,"Top1 ₹200 • Top2 ₹100 • Top3 ₹50 • Top4 ₹40")}
    ${card(50,"Top1 ₹240 • Top2 ₹120 • Top3 ₹90 • Top4 ₹50")}
    ${card(55,"Top1 ₹260 • Top2 ₹150 • Top3 ₹100 • Top4 ₹50")}
    ${card(75,"Top1 ₹300 • Top2 ₹200 • Top3 ₹100 • Top4 ₹100 • Top5 ₹50")}

    <button onclick="homeView()">Back</button>
  `;
}

function card(price, prize) {
  return `
    <div style="border:1px solid #00bfff;margin:10px;padding:10px;border-radius:10px;">
      <h3>₹${price} SCRIMS</h3>
      <p>${prize}</p>
      <button onclick="selectTime(${price})">Join ₹${price}</button>
    </div>
  `;
}

/* ---------- TIME SELECT ---------- */

function selectTime(price) {
  app.innerHTML = `
    <h2>Select Time ₹${price}</h2>

    ${time(price,"3:00 Day")}
    ${time(price,"1:00 Day")}
    ${time(price,"1:00 Night")}
    ${time(price,"12:00 Night")}
    ${time(price,"12:00 Day")}
    ${time(price,"6:00 Evening")}
    ${time(price,"9:00 Day")}
    ${time(price,"9:00 Night")}

    <button onclick="scrimsView()">Back</button>
  `;
}

function time(price, t) {
  return `<button onclick="joinMatch(${price},'${t}')">${t}</button>`;
}

/* ---------- JOIN ---------- */

function joinMatch(price, time) {
  let u = getSession();
  let db = getDB();

  if (db[u].wallet < price) return alert("Not enough money");

  db[u].wallet -= price;
  saveDB(db);

  alert("Joined ₹"+price+" at "+time);
  homeView();
}

/* ---------- START ---------- */

loginView();
</script>

</body>
</html>
