<!DOCTYPE html>
<html>
<head>
<title>TGC Paid Scrims</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; background:#0d0d0d; color:white; }
.page { display:none; padding:20px; }
.active { display:block; }
button { padding:10px; margin:5px; width:100%; background:red; color:white; border:none; border-radius:8px; }
input { padding:10px; width:100%; margin:5px 0; border-radius:8px; border:none; }
h2 { text-align:center; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="page active">
  <h2>TGC PAID SCRIMS</h2>
  <input id="username" placeholder="Enter Name">
  <button onclick="login()">Enter</button>
</div>

<!-- MODE -->
<div id="mode" class="page">
  <h2>Select Mode</h2>
  <button onclick="selectMode('BR SCRIMS')">BR SCRIMS</button>
  <button onclick="selectMode('CLASH SQUAD')">CLASH SQUAD</button>
  <button onclick="selectMode('LONEWOLF')">LONEWOLF</button>
  <button onclick="selectMode('BR PER KILL')">BR PER KILL</button>
</div>

<!-- ENTRY -->
<div id="entry" class="page">
  <h2>Select Entry</h2>
  <button onclick="selectEntry(20)">₹20</button>
  <button onclick="selectEntry(30)">₹30</button>
  <button onclick="selectEntry(55)">₹55</button>
  <button onclick="selectEntry(75)">₹75</button>
</div>

<!-- TIME -->
<div id="time" class="page">
  <h2>Select Time</h2>
  <button onclick="selectTime('3:00 Day')">3:00 Day</button>
  <button onclick="selectTime('9:00 Night')">9:00 Night</button>
  <button onclick="selectTime('12:00 Night')">12:00 Night</button>
</div>

<!-- NAME -->
<div id="name" class="page">
  <h2>Enter Details</h2>
  <input id="playerName" placeholder="Team / In-Game Name">
  <button onclick="saveData()">Join</button>
</div>

<!-- ROOM -->
<div id="room" class="page">
  <h2>WAIT FOR ROOM ID PASSWORD</h2>
  <div id="roomData"></div>
</div>

<script>
let data = {};

function show(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
}

function login(){
  const name = document.getElementById("username").value;
  if(!name) return alert("Enter name");
  data.user = name;
  show("mode");
}

function selectMode(mode){
  data.mode = mode;
  show("entry");
}

function selectEntry(amount){
  data.amount = amount;
  show("time");
}

function selectTime(time){
  data.time = time;
  show("name");
}

function saveData(){
  data.name = document.getElementById("playerName").value;

  localStorage.setItem("playerData", JSON.stringify(data));

  show("room");
  loadRoom();
}

function loadRoom(){
  const room = localStorage.getItem("roomId");
  const pass = localStorage.getItem("roomPass");

  if(room && pass){
    document.getElementById("roomData").innerHTML =
      "<h3>ROOM ID: "+room+"</h3><h3>PASSWORD: "+pass+"</h3>";
  } else {
    document.getElementById("roomData").innerHTML = "<p>Waiting...</p>";
  }
}
</script>

</body>
</html>
