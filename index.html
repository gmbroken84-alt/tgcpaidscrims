<!DOCTYPE html>
<html>
<head>
<title>TGC SCRIMS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
  text-align:center;
}
h1{color:#00bfff;}

.box{
  background:#111;
  margin:15px;
  padding:20px;
  border-radius:12px;
  border:2px solid #00bfff;
}

button{
  padding:12px;
  margin:6px;
  background:#00bfff;
  border:none;
  border-radius:8px;
}

input{
  padding:12px;
  margin:10px;
  width:80%;
  border-radius:8px;
}
</style>
</head>

<body>

<h1>🔥 TGC SCRIMS 🔥</h1>
<div id="app"></div>

<script>

// ===== LOGIN =====
function loginPage(){
  app.innerHTML =
  '<div class="box">'+
  '<h2>PLAYER LOGIN</h2>'+
  '<input id="user" placeholder="Username"><br>'+
  '<button onclick="login()">ENTER</button><br>'+
  '<button onclick="adminLogin()">👑 ADMIN</button>'+
  '</div>';
}

function login(){
  localStorage.setItem("user",user.value);
  if(!localStorage.getItem("wallet")) localStorage.setItem("wallet",0);
  home();
}

// ===== ADMIN LOGIN =====
function adminLogin(){
  app.innerHTML =
  '<div class="box">'+
  '<h2>ADMIN LOGIN</h2>'+
  '<input id="auser" placeholder="Admin ID"><br>'+
  '<input id="apass" placeholder="Password"><br>'+
  '<button onclick="checkAdmin()">LOGIN</button>'+
  '<button onclick="loginPage()">BACK</button>'+
  '</div>';
}

function checkAdmin(){
  if(auser.value=="TGCADMIN" && apass.value=="TEAMEGOISTIC"){
    adminPanel();
  } else alert("Wrong Admin");
}

// ===== ADMIN PANEL =====
function adminPanel(){
  app.innerHTML =
  '<div class="box">'+
  '<h2>ADMIN PANEL</h2>'+
  '<input id="mode" placeholder="Mode (PER KILL ₹10)"><br>'+
  '<input id="room" placeholder="Room ID"><br>'+
  '<input id="pass" placeholder="Password"><br>'+
  '<button onclick="releaseRoom()">RELEASE ROOM</button>'+
  '<button onclick="loginPage()">LOGOUT</button>'+
  '</div>';
}

function releaseRoom(){
  let m=mode.value.toUpperCase().trim();
  let data={room:room.value,pass:pass.value};
  localStorage.setItem("room_"+m,JSON.stringify(data));
  alert("Room Released");
}

// ===== HOME =====
function home(){
  let w = parseInt(localStorage.getItem("wallet")||0);

  app.innerHTML =
  '<div class="box">'+
  '<h2>WELCOME '+localStorage.getItem("user")+'</h2>'+
  '<h3>💰 Wallet: ₹'+w+'</h3>'+
  '<button onclick="addMoney()">ADD MONEY</button><br>'+
  '<button onclick="clash()">CLASH SQUAD</button>'+
  '<button onclick="lone()">LONEWOLF</button>'+
  '<button onclick="br()">BATTLE ROYAL</button>'+
  '</div>';
}

// ===== ADD MONEY =====
function addMoney(){
  let amt = prompt("Enter Amount");
  if(!amt) return;

  let w = parseInt(localStorage.getItem("wallet")||0);
  w += parseInt(amt);
  localStorage.setItem("wallet",w);

  alert("Added ₹"+amt);
  home();
}

// ===== MODES =====
function clash(){
  showMode("CLASH");
}

function lone(){
  showMode("LONE");
}

function showMode(name){
  app.innerHTML =
  '<div class="box">'+
  '<h2>'+name+'</h2>'+
  '<button onclick="joinMode(\''+name+' 1v1\')">1v1</button>'+
  '<button onclick="joinMode(\''+name+' 2v2\')">2v2</button>'+
  '<button onclick="joinMode(\''+name+' 3v3\')">3v3</button>'+
  '<button onclick="joinMode(\''+name+' 4v4\')">4v4</button>'+
  '<button onclick="home()">BACK</button>'+
  '</div>';
}

// ===== BR =====
function br(){
  app.innerHTML =
  '<div class="box">'+
  '<h2>BATTLE ROYAL</h2>'+
  '<button onclick="perKill()">PER KILL</button>'+
  '<button onclick="scrims()">SCRIMS</button>'+
  '<button onclick="home()">BACK</button>'+
  '</div>';
}

// ===== PER KILL =====
function perKill(){
  app.innerHTML =
  '<div class="box">'+
  '<h2>PER KILL</h2>'+
  card(10)+card(20)+card(30)+
  '<button onclick="br()">BACK</button>'+
  '</div>';
}

function card(p){
  let s=parseInt(localStorage.getItem("slot_"+p)||0);
  return '<div class="box">'+
  '<h3>₹'+p+'</h3>'+
  '<p>'+s+'/48</p>'+
  '<button onclick="joinPK('+p+')">JOIN</button>'+
  '</div>';
}

function joinPK(p){
  let s=parseInt(localStorage.getItem("slot_"+p)||0);
  if(s>=48){alert("FULL");return;}
  s++;
  localStorage.setItem("slot_"+p,s);
  joinMode("PER KILL ₹"+p);
}

// ===== SCRIMS =====
function scrims(){
  app.innerHTML =
  '<div class="box">'+
  '<h2>SCRIMS</h2>'+
  scrimBtn(20)+scrimBtn(25)+scrimBtn(35)+scrimBtn(40)+
  scrimBtn(45)+scrimBtn(50)+scrimBtn(55)+scrimBtn(75)+
  '<button onclick="br()">BACK</button>'+
  '</div>';
}

function scrimBtn(p){
  return '<button onclick="joinMode(\'SCRIMS ₹'+p+'\')">₹'+p+'</button>';
}

// ===== JOIN =====
function joinMode(type){

  let times = [
    "1:00 PM","1:30 PM","2:00 PM","2:30 PM",
    "3:00 PM","3:30 PM","4:00 PM","4:30 PM","5:00 PM"
  ];

  let data = localStorage.getItem("room_"+type.toUpperCase().trim());

  let msg = "WAIT FOR ADMIN";

  if(data){
    let r = JSON.parse(data);
    msg = "ROOM: "+r.room+" | PASS: "+r.pass;
  }

  alert(
    "JOINED\n\n"+type+
    "\n\nTIME:\n"+times.join(", ")+
    "\n\n"+msg
  );
}

// START
loginPage();

</script>

</body>
</html>
