<!DOCTYPE html>
<html>
<head>
<title>Admin - TGC</title>
<style>
body { background:#111; color:white; font-family:Arial; padding:20px;}
input,button { padding:10px; margin:5px; width:100%;}
</style>
</head>

<body>

<h2>ADMIN PANEL</h2>

<input id="room" placeholder="Room ID">
<input id="pass" placeholder="Password">

<button onclick="saveRoom()">Set Room</button>

<script>
function saveRoom(){
  localStorage.setItem("roomId", document.getElementById("room").value);
  localStorage.setItem("roomPass", document.getElementById("pass").value);
  alert("Room Updated!");
}
</script>

</body>
</html>
